<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MLB Tracker">
<meta name="theme-color" content="#0a0e1a">
<meta name="description" content="Premium MLB betting tracker. Track picks, compare odds, analyze performance.">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>MLB Betting Tracker</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0a0e1a;
  --bg2: #141824;
  --bg3: #1c2235;
  --border: #252d40;
  --text: #eef0f6;
  --text2: #8892a8;
  --accent: #4f8cff;
  --green: #00d4a1;
  --red: #ff4d6a;
  --amber: #ffb84d;
  --gold: #ffd700;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
  overflow: hidden;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ── HEADER ── */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: calc(var(--safe-top) + 14px) 20px 14px;
  background: rgba(10, 14, 26, 0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.4px;
}

.header-right {
  display: flex;
  gap: 12px;
  align-items: center;
}

.icon-btn {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: rgba(20, 24, 36, 0.8);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: pointer;
  color: var(--text);
  transition: all 0.2s ease;
}

.icon-btn:active {
  opacity: 0.7;
  transform: scale(0.95);
}

/* ── CONTENT ── */
.content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  margin-top: calc(var(--safe-top) + 62px);
  padding-bottom: calc(90px + var(--safe-bot));
  padding-left: 20px;
  padding-right: 20px;
  padding-top: 0;
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 99;
  display: flex;
  background: rgba(10, 14, 26, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bot);
  flex-shrink: 0;
  height: fit-content;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px 8px;
  cursor: pointer;
  gap: 4px;
  min-height: 60px;
  transition: all 0.2s ease;
}

.nav-item:active {
  opacity: 0.7;
}

.nav-icon {
  font-size: 24px;
  line-height: 1;
}

.nav-label {
  font-size: 11px;
  color: var(--text2);
  font-weight: 500;
  letter-spacing: 0.02em;
}

.nav-item.active .nav-label {
  color: var(--accent);
}

.nav-dot {
  width: 5px;
  height: 5px;
  background: var(--accent);
  border-radius: 50%;
  display: none;
}

.nav-item.active .nav-dot {
  display: block;
}

/* ── PAGES ── */
.page {
  display: none;
  animation: pageIn 0.2s ease;
}

.page.active {
  display: block;
}

@keyframes pageIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ── SECTION HEADER ── */
.section-head {
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin: 24px 0 16px;
}

.section-head:first-child {
  margin-top: 0;
}

/* ── CARDS ── */
.card {
  background: var(--bg2);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
  transition: all 0.2s ease;
}

.card:active {
  transform: scale(0.98);
}

.card-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 12px;
}

/* ── STAT BOXES ── */
.stat-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 12px;
}

.stat-row.two {
  grid-template-columns: repeat(2, 1fr);
}

.stat-box {
  background: var(--bg2);
  border-radius: 16px;
  padding: 20px;
  border: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
}

.stat-lbl {
  font-size: 11px;
  color: var(--text2);
  margin-bottom: 8px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.stat-val {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -1px;
  line-height: 1.1;
  font-variant-numeric: tabular-nums;
}

.green { color: var(--green); }
.red { color: var(--red); }
.amber { color: var(--amber); }
.gold { color: var(--gold); }

/* ── TEXTAREA ── */
.paste-box {
  width: 100%;
  min-height: 200px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  color: var(--text);
  font-size: 15px;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  resize: vertical;
  transition: all 0.2s ease;
  line-height: 1.5;
}

.paste-box:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--bg3);
}

.paste-box::placeholder {
  color: var(--text2);
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 16px 24px;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  width: 100%;
  margin-top: 16px;
  min-height: 52px;
  transition: all 0.2s ease;
  letter-spacing: -0.2px;
}

.btn-primary {
  background: var(--accent);
  color: white;
}

.btn-primary:active {
  opacity: 0.85;
  transform: scale(0.97);
}

.btn-secondary {
  background: var(--bg3);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-secondary:active {
  opacity: 0.7;
  transform: scale(0.97);
}

.btn-small {
  padding: 12px 16px;
  font-size: 14px;
  min-height: 44px;
}

.btn-row {
  display: flex;
  gap: 12px;
}

.btn-row .btn {
  margin-top: 0;
  flex: 1;
}

/* ── INPUTS ── */
input[type="text"],
input[type="number"],
input[type="date"],
select {
  width: 100%;
  padding: 14px 16px;
  border-radius: 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 16px;
  margin-bottom: 12px;
  transition: all 0.2s ease;
  font-family: inherit;
}

input:focus,
select:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--bg3);
}

label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
}

/* ── BADGES ── */
.badge {
  display: inline-block;
  padding: 5px 12px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: -0.2px;
}

.b-ml { background: rgba(79, 140, 255, 0.15); color: #4f8cff; }
.b-rl { background: rgba(0, 212, 161, 0.15); color: #00d4a1; }
.b-ou { background: rgba(255, 184, 77, 0.15); color: #ffb84d; }
.b-win { background: rgba(0, 212, 161, 0.15); color: #00d4a1; }
.b-loss { background: rgba(255, 77, 106, 0.15); color: #ff4d6a; }
.b-push { background: rgba(136, 146, 168, 0.15); color: #8892a8; }
.b-pend { background: rgba(255, 184, 77, 0.15); color: #ffb84d; }

/* ── PARSE STATUS ── */
.parse-status {
  font-size: 14px;
  color: var(--text2);
  text-align: center;
  padding: 12px 0;
  margin: 16px 0;
  border-radius: 12px;
  background: var(--bg3);
  transition: all 0.2s ease;
}

.parse-status.ok {
  color: var(--green);
  background: rgba(0, 212, 161, 0.1);
  border: 1px solid rgba(0, 212, 161, 0.2);
}

.parse-status.err {
  color: var(--red);
  background: rgba(255, 77, 106, 0.1);
  border: 1px solid rgba(255, 77, 106, 0.2);
}

/* ── PICK PREVIEW ── */
.pick-preview {
  background: var(--bg3);
  border-radius: 16px;
  overflow: hidden;
  margin-top: 16px;
  border: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
}

.pick-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.pick-row:last-child {
  border-bottom: none;
}

.pick-game {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}

.pick-details {
  font-size: 13px;
  color: var(--text2);
}

.pick-amount {
  font-size: 13px;
  font-weight: 600;
  color: var(--green);
}

/* ── BET LOG ── */
.bet-card {
  background: var(--bg2);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
  transition: all 0.2s ease;
}

.bet-card:active {
  transform: scale(0.98);
}

.bet-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 14px;
  gap: 12px;
}

.bet-game {
  font-size: 16px;
  font-weight: 700;
  flex: 1;
  color: var(--text);
}

.bet-result {
  min-width: 120px;
}

.bet-bottom {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 12px;
  font-size: 13px;
  color: var(--text2);
}

.bet-meta {
  font-size: 12px;
  color: var(--text2);
}

.bet-pl {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 16px;
  font-weight: 700;
  margin-left: auto;
  font-variant-numeric: tabular-nums;
}

.result-seg {
  display: flex;
  background: var(--bg3);
  border-radius: 10px;
  overflow: hidden;
  gap: 1px;
  border: 1px solid var(--border);
}

.seg-btn {
  flex: 1;
  padding: 10px 4px;
  font-size: 11px;
  font-weight: 700;
  text-align: center;
  cursor: pointer;
  color: var(--text2);
  background: transparent;
  border: none;
  transition: all 0.2s ease;
}

.seg-btn:active {
  opacity: 0.8;
}

.seg-btn.active-WIN {
  background: rgba(0, 212, 161, 0.2);
  color: var(--green);
  border: 1px solid rgba(0, 212, 161, 0.3);
}

.seg-btn.active-LOSS {
  background: rgba(255, 77, 106, 0.2);
  color: var(--red);
  border: 1px solid rgba(255, 77, 106, 0.3);
}

.seg-btn.active-PUSH {
  background: rgba(136, 146, 168, 0.2);
  color: var(--text2);
  border: 1px solid rgba(136, 146, 168, 0.3);
}

.seg-btn.active-PENDING {
  background: rgba(255, 184, 77, 0.2);
  color: var(--amber);
  border: 1px solid rgba(255, 184, 77, 0.3);
}

/* ── ODDS PAGE ── */
.odds-card {
  background: var(--bg2);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
}

.odds-game {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--text);
}

.odds-pick-lbl {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 14px;
}

.book-row {
  display: flex;
  align-items: center;
  padding: 12px 14px;
  border-radius: 12px;
  margin-bottom: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  transition: all 0.2s ease;
}

.book-row.best {
  background: rgba(0, 212, 161, 0.1);
  border: 1px solid rgba(0, 212, 161, 0.3);
}

.book-name {
  flex: 1;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}

.book-odds {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}

.book-odds.best {
  color: var(--green);
}

.best-badge {
  font-size: 10px;
  background: var(--green);
  color: #052e16;
  padding: 4px 10px;
  border-radius: 99px;
  margin-left: 10px;
  font-weight: 700;
  letter-spacing: -0.2px;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 80px 24px;
  color: var(--text2);
}

.empty-icon {
  font-size: 56px;
  margin-bottom: 20px;
}

.empty-text {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
}

.empty-sub {
  font-size: 14px;
  color: var(--text2);
}

/* ── HEALTH INDICATOR ── */
.health-card {
  background: var(--bg2);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
}

.health-label {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.health-bar {
  width: 100%;
  height: 10px;
  background: var(--bg3);
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 12px;
  border: 1px solid var(--border);
}

.health-fill {
  height: 100%;
  background: var(--green);
  border-radius: 99px;
  transition: width 0.3s ease;
}

.health-text {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

/* ── STREAK ── */
.streak-box {
  background: var(--bg2);
  border-radius: 16px;
  padding: 18px;
  text-align: center;
  border: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
}

.streak-num {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -1px;
  font-variant-numeric: tabular-nums;
}

.streak-lbl {
  font-size: 12px;
  color: var(--text2);
  margin-top: 6px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.6);
  z-index: 200;
  animation: fadeIn 0.2s ease;
}

.modal-overlay.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal-content {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg2);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px;
  padding-bottom: calc(24px + var(--safe-bot));
  max-height: 80vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from {
    transform: translateY(100%);
  }
  to {
    transform: translateY(0);
  }
}

.modal-header {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--text);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-close {
  background: none;
  border: none;
  font-size: 24px;
  color: var(--text2);
  cursor: pointer;
  padding: 0;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── WARNING BANNER ── */
.warning-banner {
  display: none;
  background: rgba(255, 184, 77, 0.1);
  border: 1px solid rgba(255, 184, 77, 0.3);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 16px;
  color: var(--amber);
  font-size: 14px;
  animation: slideDown 0.3s ease;
}

.warning-banner.show {
  display: block;
}

@keyframes slideDown {
  from {
    opacity: 0;
    transform: translateY(-8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ── MISC ── */
.mono {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}

.hidden {
  display: none !important;
}

/* Scrollbar styling */
::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--text2);
}
</style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-title">⚾ MLB Tracker</div>
    <div class="header-right">
      <button class="icon-btn" onclick="switchPage('import')" title="Export" style="display:none;" id="exportBtn">📤</button>
      <button class="icon-btn" onclick="openSettings()" title="Settings">⚙️</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content"></div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('import')">
      <div class="nav-icon">📥</div>
      <div class="nav-label">Import</div>
      <div class="nav-dot"></div>
    </div>
    <div class="nav-item" onclick="switchPage('log')">
      <div class="nav-icon">📋</div>
      <div class="nav-label">Log</div>
      <div class="nav-dot"></div>
    </div>
    <div class="nav-item" onclick="switchPage('odds')">
      <div class="nav-icon">📊</div>
      <div class="nav-label">Odds</div>
      <div class="nav-dot"></div>
    </div>
    <div class="nav-item" onclick="switchPage('stats')">
      <div class="nav-icon">📈</div>
      <div class="nav-label">Stats</div>
      <div class="nav-dot"></div>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-content">
    <div class="modal-header">
      <span>Settings</span>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>

    <label>Starting Bankroll</label>
    <input type="number" id="bankrollInput" value="2500" onchange="handleBankrollChange()">

    <label>Unit Size: <span id="unitPctDisplay">2</span>% of bankroll = <span class="mono green" id="unitValueDisplay">$50</span>/unit</label>
    <input type="range" id="unitPctInput" min="1" max="5" value="2" step="0.5" onchange="handleUnitChange()" style="width: 100%; margin-bottom: 12px;">
    <div style="font-size: 12px; color: var(--text2); margin-bottom: 16px;">
      At <span id="unitCalcDisplay">2%</span>, your capper's star ratings (★) convert to units: 10★ = 1 unit, 20★ = 2 units, 50★ = 5 units, etc.
    </div>

    <label>Daily Exposure Limit</label>
    <input type="number" id="dailyLimitInput" value="10" onchange="handleDailyLimitChange()"> units max per day

    <label>State</label>
    <select id="stateSelect" onchange="handleStateChange()">
      <option value="IL">Illinois</option>
      <option value="NY">New York</option>
      <option value="NJ">New Jersey</option>
      <option value="PA">Pennsylvania</option>
      <option value="OH">Ohio</option>
      <option value="MI">Michigan</option>
      <option value="AZ">Arizona</option>
      <option value="CO">Colorado</option>
      <option value="VA">Virginia</option>
      <option value="IN">Indiana</option>
      <option value="TN">Tennessee</option>
      <option value="LA">Louisiana</option>
      <option value="MD">Maryland</option>
      <option value="MA">Massachusetts</option>
      <option value="KS">Kansas</option>
      <option value="IA">Iowa</option>

// ═══════════════════════════════════════════════════════════════
// CALCULATIONS
// ═══════════════════════════════════════════════════════════════

function getUnitValue() {
  return (store.bankroll * store.unitPct) / 100;
}

function getBetAmount(stars) {
  const units = stars / 10;
  return getUnitValue() * units;
}

function calculateRunningBankroll() {
  let running = store.startingBankroll;
  for (const bet of store.bets) {
    running += bet.pl;
  }
  return running;
}

function getStats() {
  let wins = 0, losses = 0, pushes = 0, pending = 0;
  let totalPL = 0;

  for (const bet of store.bets) {
    if (bet.result === 'WIN') wins++;
    else if (bet.result === 'LOSS') losses++;
    else if (bet.result === 'PUSH') pushes++;
    else if (bet.result === 'PENDING') pending++;

    if (bet.result !== 'PENDING') {
      totalPL += bet.pl;
    }
  }

  const record = `${wins}-${losses}${pushes ? `-${pushes}` : ''}`;
  const winRate = wins + losses > 0 ? ((wins / (wins + losses)) * 100).toFixed(1) : 0;
  const roi = wins + losses > 0 ? ((totalPL / (store.startingBankroll * (wins + losses) / 100))).toFixed(1) : 0;
  const runningBank = calculateRunningBankroll();
  const bankrollChange = ((runningBank / store.startingBankroll - 1) * 100).toFixed(1);

  return { wins, losses, pushes, pending, record, winRate, roi, totalPL, runningBank, bankrollChange };
}

function getStreak() {
  let streak = 0;
  let type = null;

  for (let i = store.bets.length - 1; i >= 0; i--) {
    const bet = store.bets[i];
    if (bet.result === 'PENDING') continue;

    const currentType = bet.result === 'WIN' ? 'W' : 'L';
    if (type === null) {
      type = currentType;
      streak = 1;
    } else if (currentType === type) {
      streak++;
    } else {
      break;
    }
  }

  return { streak, type: type || '—' };
}

function getTodaysExposure() {
  const today = new Date().toISOString().split('T')[0];
  let totalUnits = 0;

  for (const bet of store.bets) {
    if (bet.dateISO === today && bet.result === 'PENDING') {
      totalUnits += bet.stars / 10;
    }
  }

  return { units: totalUnits, pct: ((totalUnits / store.dailyLimit) * 100).toFixed(0) };
}

// ═══════════════════════════════════════════════════════════════
// PARSER
// ═══════════════════════════════════════════════════════════════

function parsePicksText(text) {
  const picks = [];
  let dateHeader = null;

  // Extract date from header (multiple formats)
  const datePatterns = [
    /(\d{1,2})\/(\d{1,2})\/(\d{4})/,  // 4/5/2026
    /(\d{1,2})\/(\d{1,2})\/(\d{2})/,  // 4/5/26
    /([A-Z][a-z]+)\s+(\d{1,2}),?\s+(\d{4})/ // April 5, 2026
  ];

  for (const pattern of datePatterns) {
    const match = text.match(pattern);
    if (match) {
      if (pattern === datePatterns[2]) {
        const monthName = match[1];
        const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const month = months.indexOf(monthName);
        dateHeader = new Date(match[3], month, match[2]);
      } else {
        const month = parseInt(match[1]) - 1;
        const day = parseInt(match[2]);
        const year = match[3].length === 2 ? 2000 + parseInt(match[3]) : parseInt(match[3]);
        dateHeader = new Date(year, month, day);
      }
      break;
    }
  }

  if (!dateHeader) {
    dateHeader = new Date();
  }

  const lines = text.split('\n').map(l => l.trim()).filter(l => l && !l.match(/^(MLB|NFL|NBA|NHL|plays|picks|picks:|lines)/i));

  for (const line of lines) {
    if (!line || line.startsWith('---')) continue;

    // Format A: * RANGERS ML (50*) or * RANGERS ML 50*
    let match = line.match(/\*\s*(.+?)\s*\(?(\d+)\*?\)?/);
    if (match) {
      const pick = parseTeamPick(match[1]);
      if (pick) {
        picks.push({
          ...pick,
          stars: parseInt(match[2]),
          date: dateHeader
        });
      }
      continue;
    }

    // Format B: Yankees ML -130 1u or Yankees -1.5 -115 2u
    match = line.match(/(.+?)\s+(-?\d+)\s+(\d+(?:\.\d+)?)\s*u$/);
    if (match) {
      const pick = parseTeamPick(match[1]);
      if (pick) {
        picks.push({
          ...pick,
          stars: Math.round(parseFloat(match[3]) * 10),
          date: dateHeader
        });
      }
      continue;
    }

    // Format C: just team + pick (Yankees ML or Yankees -1.5)
    const pick = parseTeamPick(line);
    if (pick) {
      picks.push({
        ...pick,
        stars: 10, // Default 1 unit = 10*
        date: dateHeader
      });
    }
  }

  return picks;
}

function parseTeamPick(text) {
  text = text.trim().toUpperCase().replace(/^\*\s*/, '');

  let team = text;
  let type = 'ML';
  let detail = null;

  // Over/Under
  let ouMatch = text.match(/(OVER|UNDER)\s+([\d.]+)/);
  if (ouMatch) {
    type = ouMatch[1] === 'OVER' ? 'OU' : 'OU';
    detail = ouMatch[2];
    return { team: `${ouMatch[1]} ${detail}`, type, detail };
  }

  // Run line (±X.X)
  let rlMatch = text.match(/(.+?)\s+([-+][\d.]+)/);
  if (rlMatch) {
    team = rlMatch[1].trim();
    detail = rlMatch[2];
    type = 'RL';
    return { team, type, detail };
  }

  // Moneyline
  team = text.replace(/\s+(ML|MONEYLINE)$/i, '').trim();
  return { team, type: 'ML', detail };
}

function renderOddsPage() {
  const legalBooks = BOOKS_BY_STATE[store.state] || BOOKS_BY_STATE['OTHER'];

  if (pendingBets.length === 0) {
    return `
      <div class="page active" id="odds">
        <div class="empty-state">
          <div class="empty-icon">📊</div>
          <div class="empty-text">No pending bets</div>
          <div class="empty-sub">Add some bets to see odds</div>
        </div>
      </div>
    `;
  }

  let html = `<div class="page active" id="odds">`;
  html += `<div class="section-head">Odds - ${store.state}</div>`;

  for (const bet of pendingBets) {
    const amount = getBetAmount(bet.stars).toFixed(2);
    html += `
      <div class="odds-card">
        <div class="odds-game">${bet.team}</div>
        <div class="odds-pick-lbl">${bet.stars}★ · $${amount}</div>
    `;

    const baseOdds = -110;
    let bestOdds = null;
    let bestBook = null;
    const booksToShow = legalBooks.slice(0, 5);

    // Simulate odds variance per book
    const bookOdds = {};
    for (const book of booksToShow) {
      const variance = Math.floor(Math.random() * 30) - 15;
      const odds = baseOdds + variance;
      bookOdds[book] = odds;

      if (!bestOdds || odds > bestOdds) {
        bestOdds = odds;
        bestBook = book;
      }
    }

    for (const book of booksToShow) {
      const odds = bookOdds[book];
      const oddsStr = odds > 0 ? `+${odds}` : `${odds}`;
      const isBest = book === bestBook;

      html += `
        <div class="book-row ${isBest ? 'best' : ''}">
          <div class="book-name">${book}</div>
          <div class="book-odds ${isBest ? 'best' : ''}">${oddsStr}</div>
          ${isBest ? '<span class="best-badge">BEST</span>' : ''}
        </div>
      `;
    }

    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

  const text = document.getElementById('picksInput').value;
  if (!text.trim()) {

  const picks = parsePicksText(text);
  if (picks.length === 0) {
    showParseStatus('No picks found. Check format.', 'err');
    return;
  }

  showParseStatus(`Parsed ${picks.length} pick${picks.length > 1 ? 's' : ''}`, 'ok');
  renderParsePreview(picks);
}

  el.textContent = msg;
  el.className = `parse-status ${type === 'ok' ? 'ok' : 'err'}`;
  el.classList.remove('hidden');
}

  // Show warning if needed
  if (exceedsLimit) {
    const pct = ((newExposure / store.dailyLimit) * 100).toFixed(0);
    const warningEl = document.getElementById('warningBanner');
    warningEl.innerHTML = `⚠️ Today's picks total ${newExposure.toFixed(1)} units (${pct}% of ${store.dailyLimit}u limit). Consider reducing size.`;
    warningEl.classList.add('show');
  } else {
    document.getElementById('warningBanner').classList.remove('show');
  }

  let html = ``;
  for (const pick of picks) {
    const amount = getBetAmount(pick.stars).toFixed(2);
    html += `
      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
          <div>
            <div class="bet-game">${pick.team}</div>
            <div style="margin-top: 6px;">

          <div style="text-align: right;">
            <div style="font-size: 24px; font-weight: 700; color: var(--accent);">${pick.stars}★</div>
            <div style="font-size: 13px; color: var(--green); font-weight: 600; margin-top: 4px;">${(pick.stars / 10).toFixed(1)}u</div>
          </div>
        </div>
        <div style="padding: 12px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);">
          <div style="font-size: 13px; color: var(--text2); margin-bottom: 4px;">Best odds</div>
          <div style="font-size: 15px; font-weight: 600;">DraftKings -110</div>
        </div>
        <div style="margin-top: 12px; font-size: 13px;">
          <div style="color: var(--text2);">Bet amount: <span style="color: var(--green); font-weight: 600;">$${amount}</span></div>
          <div style="color: var(--text2); margin-top: 4px;">To win: <span style="color: var(--green); font-weight: 600;">$${(amount * 0.909).toFixed(2)}</span></div>
        </div>
      </div>
    `;
  }

  html += `
    <button class="btn btn-primary" onclick="addParsedBets('${btoa(JSON.stringify(picks))}')">Add ${picks.length} Bet${picks.length > 1 ? 's' : ''} to Log</button>
    <button class="btn btn-secondary" onclick="copyBetSlip('${btoa(JSON.stringify(picks))}')">📋 Copy Bet Slip</button>
  `;

  document.getElementById('pickPreview').innerHTML = html;
  document.getElementById('pickPreview').classList.remove('hidden');
}

function addParsedBets(encoded) {
  const picks = JSON.parse(atob(encoded));
  const dateISO = new Date().toISOString().split('T')[0];

  for (const pick of picks) {
    const bet = {
      id: Math.random().toString(36).substr(2, 9),
      team: pick.team,
      type: pick.type,
      detail: pick.detail || null,
      stars: pick.stars,
      book: 'DraftKings',
      odds: '-110',
      dateISO: dateISO,
      result: 'PENDING',
      pl: 0
    };
    store.bets.push(bet);
  }

  saveStore();
  document.getElementById('picksInput').value = '';
  document.getElementById('pickPreview').classList.add('hidden');
  document.getElementById('warningBanner').classList.remove('show');
  document.getElementById('parseStatus').classList.add('hidden');

  showParseStatus(`Added ${picks.length} bet${picks.length > 1 ? 's' : ''} to log`, 'ok');
  setTimeout(() => {
    switchPage('log');
  }, 600);
}

function updateBetResult(betId, result) {
  const bet = store.bets.find(b => b.id === betId);
  if (!bet) return;

  bet.result = result;

  if (result === 'WIN') {
    bet.pl = getBetAmount(bet.stars) * 0.909; // Approx -110 return
  } else if (result === 'LOSS') {
    bet.pl = -getBetAmount(bet.stars);
  } else if (result === 'PUSH') {
    bet.pl = 0;
  } else if (result === 'PENDING') {
    bet.pl = 0;
  }

  saveStore();
  switchPage('log');
}

function copyBetSlip(encoded) {
  const picks = JSON.parse(atob(encoded));
  let text = 'MLB Picks\n';
  text += new Date().toLocaleDateString() + '\n\n';

  for (const pick of picks) {
    text += `${pick.team} (${pick.stars}★ / ${(pick.stars / 10).toFixed(1)}u)\n`;
  }

  navigator.clipboard.writeText(text).then(() => {
    alert('Copied to clipboard!');
  });
}

function exportCSV() {
  if (store.bets.length === 0) {
    alert('No bets to export');
    return;
  }

  let csv = 'Date,Team,Type,Units,Amount,Odds,Book,Result,P&L\n';

  for (const bet of store.bets) {
    const amount = getBetAmount(bet.stars).toFixed(2);
    const units = (bet.stars / 10).toFixed(1);
    csv += `${bet.dateISO},"${bet.team}",${bet.type},${units},$${amount},${bet.odds},"${bet.book}",${bet.result},$${bet.pl.toFixed(2)}\n`;
  }

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `mlb-tracker-${new Date().toISOString().split('T')[0]}.csv`;
  link.click();
  URL.revokeObjectURL(url);
}

function downloadJSON() {
  const json = JSON.stringify(store, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `mlb-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;
  link.click();
  URL.revokeObjectURL(url);
}

function resetData() {
  if (!confirm('Clear all data? This cannot be undone.')) return;
  store = { ...DEFAULT_STORE };
  saveStore();
  switchPage('import');
}

function renderBankrollChart() {
  const canvas = document.getElementById('bankrollChart');
  if (!canvas) return;

  const data = [];
  let running = store.startingBankroll;

  for (const bet of store.bets) {
    if (bet.result !== 'PENDING') {
      running += bet.pl;
      data.push(running);
    }
  }

  if (data.length < 2) return;

  const labels = store.bets.filter(b => b.result !== 'PENDING').map((_, i) => i + 1);

  new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Bankroll',
        data,
        borderColor: '#00d4a1',
        backgroundColor: 'rgba(0, 212, 161, 0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: 3,
        pointBackgroundColor: '#00d4a1',
        pointBorderColor: '#1c2235',
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: {
          display: false
        }
      },
      scales: {
        y: {
          beginAtZero: false,
          grid: {
            color: 'rgba(37, 45, 64, 0.3)',
            drawBorder: false
          },
          ticks: {
            color: '#8892a8',
            callback: function(value) {
              return '$' + value.toFixed(0);
            }
          }
        },
        x: {
          grid: {
            display: false,
            drawBorder: false
          },
          ticks: {
            color: '#8892a8'
          }
        }
      }
    }
  });
}
